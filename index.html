<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رنگارنگ — دنیای کادو و تولد</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Vazirmatn',Tahoma,sans-serif;direction:rtl;background:#fff;color:#1a1a2e}
button,input,select,textarea{font-family:inherit;cursor:pointer}
.page{display:none;position:relative;z-index:1}
.page.on{display:block}

:root{--pk:#e91e8c;--pu:#7c3aed;--gray:#f7f4ff;--dark:#1a1a2e}

#topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(255,255,255,.96);border-bottom:1px solid #eee}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;background:none;border:none}
.logo-txt{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--pk),var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tnav{display:flex;gap:8px}
.nbtn{padding:7px 13px;border:1.5px solid var(--pk);border-radius:20px;background:transparent;color:var(--pk);font-size:13px;font-weight:600;transition:all .2s}
.nbtn:hover{background:var(--pk);color:#fff}
.cartbtn{position:relative;width:40px;height:40px;border-radius:50%;border:none;background:var(--gray);display:flex;align-items:center;justify-content:center;font-size:18px}
.cbadge{position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:var(--pk);color:#fff;border-radius:50%;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}

#hero{position:relative;min-height:100vh;padding-top:70px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--pk),var(--pu));color:#fff;text-align:center;overflow:hidden}
/* Global floating balloons - covers entire site */
.site-float{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.fitem{position:absolute;font-size:30px;opacity:.18;animation:floatY 8s ease-in-out infinite}
.f1{top:8%;left:5%;animation-duration:7s;animation-delay:0s}
.f2{top:30%;left:92%;font-size:26px;animation-duration:9s;animation-delay:.8s}
.f3{top:55%;left:3%;font-size:22px;animation-duration:8.5s;animation-delay:1.5s}
.f4{top:75%;left:88%;font-size:28px;animation-duration:7.5s;animation-delay:.3s}
.f5{top:20%;left:50%;font-size:20px;animation-duration:10s;animation-delay:2s}
.f6{top:88%;left:20%;font-size:24px;animation-duration:8s;animation-delay:1s}
.f7{top:42%;left:78%;font-size:22px;animation-duration:9.5s;animation-delay:.5s}
.f8{top:65%;left:45%;font-size:20px;animation-duration:7.8s;animation-delay:1.8s}
@keyframes floatY{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-30px) rotate(8deg)}}
/* hero-float no longer needed (covered by site-float) */
.hero-float{display:none}
.hero-c{z-index:10;max-width:520px;padding:0 20px}
.hero-h1{font-size:clamp(30px,8vw,52px);font-weight:900;line-height:1.15;margin-bottom:12px}
.hero-sub{font-size:15px;opacity:.9;margin-bottom:24px}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-w{padding:12px 26px;background:#fff;color:var(--pk);border:none;border-radius:25px;font-size:14px;font-weight:800;transition:transform .2s}
.btn-w:hover{transform:scale(1.04)}

.banner-slider{position:relative;margin:16px 14px;border-radius:16px;overflow:hidden;background:#f0f0f0}
.banner-slide{display:none;width:100%}
.banner-slide.active{display:block}
.banner-slide img{width:100%;height:auto;display:block;max-height:340px;object-fit:cover;border-radius:16px}
.banner-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:5}
.banner-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:all .3s}
.banner-dot.active{background:#fff;width:24px}

.sec{padding:40px 18px}
.sec-t{font-size:22px;font-weight:900;margin-bottom:18px}
.cats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(min-width:580px){.cats{grid-template-columns:repeat(4,1fr);gap:14px}}
.cat{aspect-ratio:1;border-radius:12px;padding:12px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .2s;background-size:cover;background-position:center}
.cat-active{outline:3px solid var(--pk);outline-offset:2px}
.cat:hover{transform:translateY(-4px)}
.cat-nm{font-size:11px;font-weight:800;margin-top:6px;text-shadow:0 1px 3px rgba(0,0,0,.2)}

.prods{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:580px){.prods{grid-template-columns:repeat(3,1fr)}}
.pcard{border:1px solid #f0f0f0;border-radius:14px;overflow:hidden;transition:transform .2s;cursor:pointer;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06)}

.pthumb{height:200px;display:flex;align-items:center;justify-content:center;background:#fff;overflow:hidden;border-bottom:1px solid #f5f5f5}
.pthumb img{max-width:100%;max-height:200px;object-fit:contain}
.pbody{padding:12px;background:#fff}
.pname{font-size:12px;font-weight:700;margin-bottom:4px}
.pprice{font-size:14px;font-weight:900;color:var(--pk)}
.btn-add{width:100%;margin-top:8px;padding:8px;background:linear-gradient(135deg,var(--pk),var(--pu));color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:800}

footer{background:var(--dark);color:#fff;padding:32px 18px;font-size:13px}
.fl{font-size:18px;font-weight:900;color:var(--pk);margin-bottom:12px}

#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:flex-end;justify-content:center}
#ov.on{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:22px 18px 32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mtitle{font-size:16px;font-weight:900}
.mclose{width:32px;height:32px;border:none;background:var(--gray);border-radius:50%;cursor:pointer;font-size:18px}

.fi{margin-bottom:12px}
.fi label{font-size:12px;color:#555;display:block;margin-bottom:4px;font-weight:600}
.fi input,.fi select{width:100%;padding:10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit}
.fi input:focus,.fi select:focus{outline:none;border-color:var(--pu)}

#adminPage{min-height:100vh;background:var(--gray)}
.atop{background:linear-gradient(135deg,#2d1b4e,var(--pu));color:#fff;padding:12px 18px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.atop h2{font-size:16px;margin:0}
.alogout{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}

.atabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid #f0f0f0;position:sticky;top:54px;z-index:50}
.atabs::-webkit-scrollbar{display:none}
.atab{padding:12px 14px;border:none;background:transparent;font-size:12px;font-weight:700;color:#999;white-space:nowrap;border-bottom:3px solid transparent;cursor:pointer}
.atab.on{color:var(--pu);border-bottom-color:var(--pu)}

.abody{padding:16px}

.btn-save{width:100%;padding:11px;background:linear-gradient(135deg,var(--pk),var(--pu));color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;margin-top:8px}

.uzone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.uprev{display:none;margin-top:10px;max-height:120px;border-radius:8px;max-width:100%;object-fit:contain}

.item-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.item{display:flex;gap:10px;padding:10px;background:#f9f9f9;border-radius:8px;align-items:center}
.item-thumb{width:50px;height:50px;background-size:cover;background-position:center;border-radius:6px}
.item-info{flex:1}
.item-name{font-size:12px;font-weight:700}

.btn-del{padding:4px 8px;background:#e53935;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}

.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin:10px 0}
.color-item{padding:8px;background:#f9f9f9;border-radius:6px;text-align:center}
.color-swatch{width:40px;height:40px;border-radius:4px;margin:0 auto 4px;border:1px solid #ddd}
.color-name{font-size:10px;font-weight:600;color:#555;margin-bottom:4px}

.img-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px;margin:10px 0}
.img-thumb{width:100%;aspect-ratio:1;background-size:cover;background-position:center;border-radius:6px;border:1px solid #e0e0e0;position:relative;cursor:pointer}
.img-thumb .del{position:absolute;top:-8px;right:-8px;width:24px;height:24px;background:#e53935;color:#fff;border:none;border-radius:50%;font-size:12px;display:none;cursor:pointer}
.img-thumb:hover .del{display:flex;align-items:center;justify-content:center}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
#toast.on{opacity:1}

.fi2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fi2 .fi{margin-bottom:0}
</style>

<script>
var SUPA_URL='https://wxoctiacletkrrqjrxkv.supabase.co';
var SUPA_KEY='sb_publishable_itPSBN6vTAw3E9ZOzeKYyA_Z82kTz2W';
var supa=window.supabase.createClient(SUPA_URL,SUPA_KEY);

var ADMINS={}; // از Supabase لود میشه

async function loadAdmins(){
  try{
    var res=await supa.from('admin_users').select('email,password,role');
    if(res.data&&res.data.length){
      res.data.forEach(a=>{ADMINS[a.email]={pass:a.password,role:a.role||'product'};});
    }
  }catch(e){console.warn('loadAdmins:',e);}
}
var me=null, prods=[], cats=[], bans=[], cart=[], editId=null, ords=[], usrs=[];
var currentUser=null; // مشتری لاگین‌شده
var SMS_SENDER='2000660110'; // شماره فرستنده کاوه‌نگار

function sendSMS(receptor, message){
  if(!receptor||!message)return;
  var num=receptor.replace(/^0/,'98');
  // روش اول: از طریق Supabase Edge Function (بدون مشکل CORS)
  var edgeUrl=SUPA_URL+'/functions/v1/kavenegar-sms';
  return fetch(edgeUrl,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+SUPA_KEY
    },
    body:JSON.stringify({receptor:num,message,sender:SMS_SENDER})
  }).then(r=>r.json()).then(d=>{
    console.log('SMS sent via Edge Function:',d);
    return d;
  }).catch(e=>{
    console.warn('Edge Function failed, trying direct:',e);
    // روش دوم: مستقیم (ممکنه CORS بده ولی بعضی مرورگرها قبول میکنن)
    if(!ss.kav)return;
    var url='https://api.kavenegar.com/v1/'+ss.kav+'/sms/send.json'
      +'?receptor='+encodeURIComponent(num)
      +'&sender='+encodeURIComponent(SMS_SENDER)
      +'&message='+encodeURIComponent(message);
    return fetch(url,{mode:'no-cors'}).catch(e2=>console.warn('Direct SMS also failed:',e2));
  });
}

    if(u)currentUser=JSON.parse(u);

}
var ss={kav:'',phone:'',address:'',instagram:'',mapsLink:'',color1:'',color2:'',cardNum:''}, banIdx=0, bnrTimer;
var curImgFiles=[], curColors=[];
var activeCat=null;

async function compressImg(file,targetKB){
  targetKB=targetKB||300;
  var targetBytes=targetKB*1024;
  return new Promise((resolve,reject)=>{
    var reader=new FileReader();
    reader.readAsDataURL(file);
    reader.onerror=()=>reject(new Error('خطا در خواندن فایل'));
    reader.onload=e=>{
      var img=new Image();
      img.onerror=()=>reject(new Error('خطا در بارگذاری عکس'));
      img.onload=async()=>{
        var maxDim=1200;
        var s=Math.min(1,maxDim/img.width,maxDim/img.height);
        var w=Math.round(img.width*s), h=Math.round(img.height*s);

        function renderBlob(w,h,q){
          return new Promise(res=>{
            var c=document.createElement('canvas');
            c.width=w;c.height=h;
            c.getContext('2d').drawImage(img,0,0,w,h);
            c.toBlob(b=>res(b),'image/webp',q);
          });
        }

        // مرحله ۱: کاهش تدریجی کیفیت در همین ابعاد، بدون افت محسوس کیفیت
        var qualities=[0.8,0.7,0.6,0.5,0.4];
        var bestBlob=null;
        for(var i=0;i<qualities.length;i++){
          var b=await renderBlob(w,h,qualities[i]);
          if(!bestBlob)bestBlob=b;
          if(b.size<=targetBytes){bestBlob=b;break;}
          bestBlob=b;
        }

        // مرحله ۲: اگه هنوز حجم زیاده، ابعاد رو هم کمی کوچیک می‌کنیم (حداکثر تا ۶۰٪ سایز اولیه)
        var curW=w,curH=h;
        var minScale=0.6;
        while(bestBlob.size>targetBytes && (curW*minScale)>=300){
          curW=Math.round(curW*0.85);
          curH=Math.round(curH*0.85);
          var b2=await renderBlob(curW,curH,0.6);
          if(b2.size<bestBlob.size)bestBlob=b2;
          if(b2.size<=targetBytes){bestBlob=b2;break;}
        }

        resolve(new File([bestBlob],'img.webp',{type:'image/webp'}));
      };
      img.src=e.target.result;
    };
  });
}

function renderBan(){

  var sl=document.getElementById('bannerSlider');
  sl.style.display='';

  // همه‌ی slide‌ها رو با img واقعی بساز
  bans.forEach((b,i)=>{
    var el=document.getElementById('bslide'+i);
    if(!el){
      el=document.createElement('div');

      el.id='bslide'+i;

    }
    el.innerHTML=`<img src="${b.image_url}" alt="${b.title||''}" loading="lazy">`;
    el.classList.toggle('active',i===0);

  // dots
  var dotsEl=document.getElementById('bannerDots');
  if(dotsEl) dotsEl.innerHTML=bans.map((_,i)=>`<div class="banner-dot${i===0?' active':''}" id="bdot${i}" onclick="jumpBan(${i})"></div>`).join('');

  clearInterval(bnrTimer);
  if(bans.length>1) bnrTimer=setInterval(nextBan,4000);
}

function nextBan(){
  if(!bans.length)return;
  // hide all slides
  document.querySelectorAll('.banner-slide').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.banner-dot').forEach(d=>d.classList.remove('active'));
  var el=document.getElementById('bslide'+banIdx);
  var dot=document.getElementById('bdot'+banIdx);
  if(el)el.classList.add('active');
  if(dot)dot.classList.add('active');
  banIdx=(banIdx+1)%bans.length;
}

function jumpBan(i){
  banIdx=i;
  nextBan();
  // چون nextBan یه قدم جلو می‌ره، باید یه قدم عقب بریم
  banIdx=i;
  clearInterval(bnrTimer);
  if(bans.length>1) bnrTimer=setInterval(nextBan,4000);
}

    var url=supa.storage.from('product-images').getPublicUrl(fn).data.publicUrl;
    await supa.from('orders').update({receipt_url:url,status:'پرداخت شده'}).eq('id',orderId);
    var ord=ords.find(o=>Number(o.id)===Number(orderId));
    if(ord){ord.receipt_url=url;ord.status='پرداخت شده';}
    // صفحه تشکر قشنگ
    var b=document.getElementById('cartBody');
    if(b){
      b.innerHTML=`<div style="text-align:center;padding:24px 16px">

async function placeOrd(t){
  var nm=document.getElementById('on').value.trim();
  var ph=document.getElementById('op').value.trim();
  var addr=document.getElementById('oa').value.trim();
  var by=document.getElementById('obY').value,bm=document.getElementById('obM').value,bd=document.getElementById('obD').value;
  var birth=(by&&bm&&bd)?(by+'/'+String(bm).padStart(2,'0')+'/'+String(bd).padStart(2,'0')):''
  if(!nm||!ph){toast('❌ نام و موبایل الزامی است');return;}
  if(!addr){toast('❌ آدرس ارسال الزامی است');return;}
  if(!/^09\d{9}$/.test(ph)){toast('❌ موبایل صحیح نیست (مثال: 09123456789)');return;}
  var it=cart.map(x=>x.nm+' ×'+x.qty).join('، ');
  var payload={cust:nm,ph:ph,items:it,total:t,status:'در انتظار پرداخت'};
  if(addr)payload.address=addr;
  if(birth)payload.birth=birth;
  var res=await supa.from('orders').insert(payload).select();
  if(res.error&&/column .* (does not exist|could not find)/i.test(res.error.message)){
    res=await supa.from('orders').insert({cust:nm,ph:ph,items:it,total:t,status:'در انتظار پرداخت'}).select();
  }
  if(res.error){toast('❌ خطا: '+res.error.message);console.error(res.error);return;}
  var newOrder=res.data&&res.data[0];
  if(newOrder)ords=[newOrder,...ords];
  if(ss.kav){
    var custMsg='سلام '+nm+' عزیز 🎈\nسفارش شما در رنگارنگ ثبت شد.\nمبلغ: '+t.toLocaleString('fa-IR')+' تومان\nلطفاً فیش واریزی را در سایت آپلود کنید.\nممنون از خریدتون 💛\nرنگارنگ مهرشهر';
    sendSMS(ph, custMsg);
    if(ss.phone){
      var ownerMsg='سفارش جدید رنگارنگ\nنام: '+nm+'\nموبایل: '+ph+'\nمبلغ: '+t.toLocaleString('fa-IR')+' تومان\nادرس: '+(addr||'-')+'\nاقلام: '+it;
      sendSMS(ss.phone, ownerMsg);
    }
  }
  cart=[];
  document.getElementById('cbadge').textContent='0';
  var titleEl=document.getElementById('cartModal').querySelector('.mtitle');
  if(titleEl)titleEl.textContent='پرداخت';
  showPaymentStep(newOrder?newOrder.id:0,t,nm);
}

async function verifyOtp(){
  var entered=(document.getElementById('otpInput')||{}).value;
  if(!entered||String(entered).trim().length!==5){toast('❌ کد ۵ رقمی را وارد کنید');return;}
  if(String(entered).trim()!==otpCode){toast('❌ کد اشتباه است');return;}
  var {f,l,ph,birth}=otpPending;
  var res=await supa.from('registrations').insert({f,l,ph,birth:birth||'',created_at:new Date().toISOString()}).select();
  if(res.error){toast('❌ خطا: '+res.error.message);return;}
  if(res.data&&res.data[0]){usrs=[res.data[0],...usrs];saveCurrentUser({f,l,ph,birth:birth||''});}
  if(ss.kav){
    var welcomeMsg='سلام '+f+' عزیز\nثبت‌نامت در رنگارنگ تکمیل شد ✅\nتخفیف ۵٪ ویژه اعضا منتظرته\nشریک همه شادی‌هاتون باشیم\nرنگارنگ مهرشهر';
    sendSMS(ph, welcomeMsg);
  }
  otpCode='';otpPending={f:'',l:'',ph:'',birth:''};
  closeM();

}

async function saveBan(){
  var t=document.getElementById('bt').value.trim();
  if(!t||!biF){toast('❌ عنوان و عکس را پر کن');return;}
  try{
    var c=await compressImg(biF);
    var fn=Date.now()+'_'+biF.name.replace(/[^a-z0-9.]/gi,'_');

    if(r.error){toast('❌ خطا آپلود: '+r.error.message);console.error(r.error);return;}
    var u=supa.storage.from('product-images').getPublicUrl('banners/'+fn).data.publicUrl;
    var res=await supa.from('banners').insert({title:t,image_url:u,sort_order:bans.length,is_active:true}).select();
    if(res.error && /column .* does not exist/i.test(res.error.message)){
      res=await supa.from('banners').insert({title:t,image_url:u}).select();

async function saveProd(){
  var n=document.getElementById('pn').value.trim();
  var c=document.getElementById('pc').value;
  var p=parseInt(document.getElementById('pp').value)||0;
  var s=parseInt(document.getElementById('ps').value)||0;
  var d=document.getElementById('pd').value.trim();
  if(!cats.length){toast('❌ اول باید حداقل یک دسته‌بندی بسازی');return;}
  if(!n||!c||!p||!curImgFiles.length){toast('❌ پر کن و عکس اضافه کن');return;}

  try{
    var urls=[];
    for(var f of curImgFiles){
      var cm=await compressImg(f);
      var fn=Date.now()+'_'+Math.random().toString(36).slice(2)+'.webp';
      var r=await supa.storage.from('product-images').upload('products/'+fn,cm);
      if(r.error){toast('❌ خطا آپلود عکس: '+r.error.message);console.error(r.error);return;}
      urls.push(supa.storage.from('product-images').getPublicUrl('products/'+fn).data.publicUrl);
    }

    var payload={nm:n,cat:c,pr:p,st:s,img:urls[0]||''};
    if(d)payload.description=d;
    if(curColors.length)payload.colors=JSON.stringify(curColors);

    var res=await supa.from('products').insert(payload).select();
    if(res.error && /column .* (does not exist|could not find)/i.test(res.error.message)){
      // اگه ستون‌های description/colors هنوز ساخته نشده باشن، با حداقل فیلدها دوباره امتحان کن
      res=await supa.from('products').insert({nm:n,cat:c,pr:p,st:s,img:urls[0]||''}).select();
    }
    if(res.error){toast('❌ خطا: '+res.error.message);console.error(res.error);return;}

    var newProd=res.data[0];

    // عکس‌های اضافی (غیر از عکس اول) را در جدول product_images ذخیره کن
    if(urls.length>1){
      var extraImgs=urls.slice(1).map((u,i)=>({product_id:newProd.id,image_url:u,sort_order:i}));
      var imgRes=await supa.from('product_images').insert(extraImgs);
      if(imgRes.error){console.error('خطا در ذخیره عکس‌های اضافی:',imgRes.error);}
    }

    prods=[...prods,newProd];
    document.getElementById('pn').value='';document.getElementById('pp').value='';document.getElementById('ps').value='';document.getElementById('pd').value='';
    curImgFiles=[];curColors=[];
    document.getElementById('ig').innerHTML='';document.getElementById('cg').innerHTML='';
    toast('✅ محصول اضافه شد');
    renderAll();
  }catch(e){
    toast('❌ خطا: '+e.message);
    console.error(e);
  }
}

function rList(){
  return `<div class="item-list">${prods.map(p=>`<div class="item"><div class="item-thumb" style="background-image:url(${p.img})"></div><div class="item-info"><div class="item-name">${p.nm}</div><div style="font-size:11px;color:#999">${p.cat}</div></div><div class="item-acts"><button class="btn-del" onclick="delProd(${p.id})">حذف</button></div></div>`).join('')}</div>`;
}

async function delProd(id){
  if(!confirm('حذف؟'))return;
  await supa.from('products').delete().eq('id',id);
  prods=prods.filter(p=>p.id!==id);
  toast('✅ حذف شد');
  renderAll();
}

  var el=document.getElementById('ordDetailModal');
  el.innerHTML=`<div class="mhd"><span class="mtitle">جزئیات سفارش #${o.id}</span><button class="mclose" onclick="closeM()">✕</button></div>

      <div style="font-weight:700;font-size:14px;margin-bottom:8px">👤 اطلاعات خریدار</div>

      <div style="font-size:13px;margin-bottom:4px;direction:ltr;text-align:right">موبایل: <strong>${o.ph}</strong></div>
      ${o.address?`<div style="font-size:13px;margin-bottom:4px">آدرس: <strong>${o.address}</strong></div>`:''}
      ${o.birth?`<div style="font-size:13px">تاریخ تولد: <strong>${o.birth}</strong></div>`:''}

  </div>`;

}

async function updOrdStatus(id,status){
  id=Number(id);
  var res=await supa.from('orders').update({status}).eq('id',id);
  if(res.error){toast('❌ خطا: '+res.error.message);return;}
  var o=ords.find(x=>Number(x.id)===id);
  if(o)o.status=status;
  toast('✅ وضعیت بروزرسانی شد');
}

function exportOrders(){
  if(!ords.length){toast('❌ سفارشی برای دانلود نیست');return;}
  var rows=['نام,موبایل,اقلام,مبلغ,آدرس,وضعیت,تاریخ تولد'];
  ords.forEach(o=>rows.push(`"${o.cust||''}","${o.ph||''}","${o.items||''}",${o.total||0},"${o.address||''}","${o.status||''}","${o.birth||''}"`));
  var blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rangarang-orders.csv';a.click();
  toast('📥 فایل دانلود شد');
}

async function saveSettingsPartial(fields){
  // ابتدا چک کن ردیف تنظیمات وجود دارد یا نه
  var existing=await supa.from('settings').select('id').eq('id',1).maybeSingle();
  if(existing.data){
    return await supa.from('settings').update(fields).eq('id',1);
  }else{
    return await supa.from('settings').insert(Object.assign({id:1},fields));
  }
}

async function saveContactInfo(){
  var cardNum=document.getElementById('stCard').value.trim();
  var phone=document.getElementById('stPhone').value.trim();
  var address=document.getElementById('stAddress').value.trim();
  var instagram=document.getElementById('stInsta').value.trim();
  var mapsLink=document.getElementById('stMaps').value.trim();
  var res=await saveSettingsPartial({card_num:cardNum,phone,address,instagram,maps_link:mapsLink});
  if(res.error){toast('❌ خطا در ذخیره: '+res.error.message);console.error(res.error);return;}
  ss.cardNum=cardNum;ss.phone=phone;ss.address=address;ss.instagram=instagram;ss.mapsLink=mapsLink;
  toast('✅ اطلاعات تماس ذخیره شد');
  renderAll();
}

  ss.color1=c1;ss.color2=c2;

async function saveSet(){
